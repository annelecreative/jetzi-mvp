<!doctype html>
<html>
  <body>
    <h1>Check your email</h1>

    <p>We sent a verification link to {{ email }}.</p>
    <p>Your alert will activate after you click the link.</p>

    {% if resend_message %}
      <p style="font-size: 14px; margin-top: 12px; color: {% if resend_success %}green{% else %}#b45309{% endif %};">
        {{ resend_message }}
      </p>
    {% endif %}

    <form action="{{ url_for('resend_verification_email') }}" method="post" style="margin-top: 12px;">
        <button type="submit"
            style="
                background: none;
                border: none;
                padding: 0;
                font-size: 14px;
                color: #4f39f6;
                text-decoration: underline;
                cursor: pointer;
            ">
            Didn’t receive it? Resend email
        </button>
    </form>
  </body>
</html>
