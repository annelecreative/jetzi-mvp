<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetzi</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body>
  <div class="page-shell">
    <main class="container container-plain">

      <section class="card" style="max-width: 520px; margin: 80px auto; text-align: center; padding: 32px;">

        <p class="hero-brand">Jetzi</p>

        <h1 style="margin-top: 8px;">Check your email ✉️</h1>

        <p style="margin-top: 12px; color: #6b7280;">
          We sent a verification link to <strong>{{ email }}</strong>.
        </p>

        <p style="margin-top: 8px; color: #6b7280;">
          Your alert will activate after you click the link.
        </p>

        <div style="margin-top: 24px;">
          <a href="{{ resend_url }}" class="btn btn-secondary">
            Resend email
          </a>
        </div>

      </section>

    </main>
  </div>
</body>
</html>
