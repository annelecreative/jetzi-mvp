<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetzi</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body>
  <div class="page-shell">
    <main class="container container-plain">

      <section class="card" style="max-width: 520px; margin: 80px auto; text-align: center; padding: 32px;">

        <p class="hero-brand">Jetzi</p>

        <h1 style="margin-top: 8px;">Check your email ✉️</h1>

        <p style="margin-top: 12px; color: #6b7280;">
            We sent a confirmation link to <strong>{{ email }}</strong>.
        </p>

        <p style="margin-top: 8px; color: #6b7280;">
            Confirm your alert from the email, then Jetzi will start watching for deals worth booking.
        </p>

        <form action="{{ url_for('resend_verification_email') }}" method="post" style="margin-top: 24px;">
            <button type="submit" class="resend-link-button">
                Resend email
            </button>
        </form>

      </section>

    </main>
  </div>
</body>
</html>
