<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jetzi - Alerts Active</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>Success</h1>
      <p class="helper-text success-message">Your email is confirmed and your alerts are now active.</p>

      <section class="success-card">
        <div class="summary-row">
          <span class="summary-label">Alert ID</span>
          <span>{{ alert.alert_id }}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Email</span>
          <span>{{ alert.email }}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Status</span>
          <span>Active</span>
        </div>
      </section>

      <div class="page-actions">
        <a class="button-link" href="{{ url_for('index', fresh=1) }}">Create a new alert</a>
      </div>
    </main>
  </body>
</html>
