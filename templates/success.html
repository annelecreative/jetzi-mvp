<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jetzi - You're all set</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body>
    <div class="page-shell">
      <main class="container container-plain">
        
        <div class="page-intro">
          <p class="hero-brand">Jetzi</p>
          <h1>You’re all set ✨</h1>
          <p>
            Jetzi is now watching your trip.<br />
            We’ll email you when a great deal shows up.
          </p>
        </div>

        <section class="success-card">
          <div class="summary-row">
            <span class="summary-label">Email</span>
            <span>{{ email_value }}</span>
          </div>
        </section>

        <div class="page-actions">
          <a href="{{ url_for('index') }}">
            <button type="button">Track another trip</button>
          </a>
        </div>

      </main>
    </div>
  </body>
</html>
