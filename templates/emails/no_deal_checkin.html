<!doctype html>
<html lang="en">
  <body style="font-family: Arial, sans-serif; color: #111827; line-height: 1.5">
    <h2>No deals this week</h2>

    <p>No strong deals matched this alert yet.</p>

    <p>
      <strong>Route:</strong> {origin} → {destinations}<br>
      <strong>Travel flexibility:</strong> {flexibility}
    </p>

    <p>We're still monitoring and will notify you when something worth booking appears.</p>

    <p style="font-size: 12px; color: #6b7280">
      {low_spam_footer}
    </p>

    <p style="font-size: 12px; color: #6b7280">
      Manage this alert: <a href="{manage_url}">view alert</a>.
    </p>

    <p style="font-size: 12px; color: #6b7280">
      To stop these emails, <a href="{unsubscribe_url}">unsubscribe</a>.
    </p>
  </body>
</html>
